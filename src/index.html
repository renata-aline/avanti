<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avanti</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700&display=swap"
      rel="stylesheet"
    />

    <!-- <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    /> -->
    <link rel="stylesheet" href="/src/css/main.css" />
  </head>
  <body>
    <div class="container">
      <div class="banner-voucher">
        <div class="content">
          <p class="banner-voucher__text">
            Ganhe
            <span class="banner-voucher__text_value">R$10,00 </span> de desconto
            no seu primeiro pedido. Utilize o cupom DESCONTO10
          </p>
        </div>
      </div>

      <header>
        <div class="content">
          <div class="top-bar">
            <div class="top-bar__menu">
              <i class="top-bar__menu_icon fa-solid fa-bars"></i>
            </div>
            <div class="top-bar__logo">
              <img
                src="/src/assets/images/logo-avanti.png"
                alt="logo Avanti"
                class="top-bar__logo_img"
              />
            </div>
            <div class="top-bar__shopping">
              <i class="top-bar__shopping_icon fa-solid fa-cart-shopping"></i>
            </div>

            <div class="top-bar__search">
              <input
                class="top-bar__search_input"
                type="text"
                placeholder="O que você procura?"
              />
              <i class="top-bar__search_icon fa-solid fa-magnifying-glass"></i>
            </div>
          </div>
        </div>
      </header>
      <main>
        <section>
          <!-- <h1>main</h1> -->
        </section>
      </main>
      <footer>
        <div class="content content--footer">
          <!-- <h1>footer</h1> -->
        </div>
      </footer>
    </div>
    <script src="/src/js/main.js"></script>
  </body>
</html>
